# cloudbuild.yaml
# Triggered automatically on git push via Cloud Build triggers.
# Requires these substitutions set in the trigger:
#   _SERVICE_NAME  (e.g. rag-policy-agent)
#   _REGION        (e.g. asia-south1)
#   _GEMINI_KEY    (store in Secret Manager, reference as $$GEMINI_API_KEY)

substitutions:
  _SERVICE_NAME: rag-policy-agent
  _REGION: asia-south1

steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest
      - .
    timeout: 1200s

  # 2. Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=2Gi
      - --cpu=2
      - --timeout=300
      - --concurrency=4
      - --min-instances=0
      - --max-instances=3
      - --set-secrets=GEMINI_API_KEY=gemini-api-key:latest
      - --quiet

images:
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
